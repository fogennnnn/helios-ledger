<section class="hlx-hero-rotator" aria-labelledby="hlx-hero-title">
  <style>
    .hlx-hero-rotator {
      --hlx-bg: #040b16;
      --hlx-text: #f3f7fb;
      --hlx-muted: #8b9bb0;
      --hlx-accent: #20d3b2;
      --hlx-speed: 220ms;
      --hlx-gap: 0.1em;
      width: 100%;
      background: transparent;
      color: var(--hlx-text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .hlx-hero-rotator__title {
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 0.95;
      font-size: clamp(2.8rem, 7vw, 5.6rem);
    }

    .hlx-hero-rotator__line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.18em;
    }

    .hlx-hero-rotator__white,
    .hlx-hero-rotator__teal {
      position: relative;
      display: inline-flex;
      align-items: center;
      overflow: hidden;
      height: 1.03em;
      vertical-align: bottom;
      isolation: isolate;
      min-width: 1ch;
    }

    .hlx-hero-rotator__white-track,
    .hlx-hero-rotator__teal-track {
      display: flex;
      flex-direction: column;
      will-change: transform;
      transform: translate3d(0, 0, 0);
      transition: transform 520ms cubic-bezier(.22,.61,.36,1);
    }

    .hlx-hero-rotator__white-item,
    .hlx-hero-rotator__teal-item {
      display: block;
      white-space: nowrap;
      height: 1.03em;
      line-height: 1.03;
      padding-bottom: 0.05em;
    }

    .hlx-hero-rotator__white-item { color: var(--hlx-text); }
    .hlx-hero-rotator__teal-item { color: var(--hlx-accent); }

    .hlx-hero-rotator__desc {
      max-width: 48rem;
      margin: 1.6rem 0 0;
      color: var(--hlx-muted);
      font-size: clamp(1rem, 1.45vw, 1.55rem);
      line-height: 1.6;
    }

    @media (prefers-reduced-motion: reduce) {
      .hlx-hero-rotator__white-track,
      .hlx-hero-rotator__teal-track {
        transition: none;
      }
    }
  </style>

  <h1 class="hlx-hero-rotator__title" id="hlx-hero-title">
    <span class="hlx-hero-rotator__line">
      <span class="hlx-hero-rotator__white" aria-hidden="true">
        <span class="hlx-hero-rotator__white-track"></span>
      </span>
      <span class="hlx-hero-rotator__teal" aria-hidden="true">
        <span class="hlx-hero-rotator__teal-track"></span>
      </span>
    </span>
  </h1>

  <p class="hlx-hero-rotator__desc">
    Cryptographically seal origin, integrity, and authorship with independently verifiable Ed25519 signatures and Merkle-root attestations.
  </p>

  <script>
    (function () {
      const whiteTerms = [
        'Artificial Intelligence',
        'Model Output',
        'Agent Activity',
        'Prompt History',
        'Response Integrity',
        'Training Evidence',
        'Inference Logs',
        'Generated Media',
        'Synthetic Audio',
        'Synthetic Video',
        'Synthetic Images',
        'Dataset Lineage',
        'Document Origin',
        'Message Authenticity',
        'API Responses',
        'Automation Runs',
        'Bot Decisions',
        'Audit Trails',
        'Source Attribution',
        'Claim History',
        'Content Fingerprints',
        'Ledger Entries',
        'Proof Chains',
        'Publication History',
        'Workflow Evidence'
      ];

      const tealTerms = [
        'Provenance',
        'Verification',
        'Authenticity',
        'Validation',
        'Attestation',
        'Traceability',
        'Integrity',
        'Certification',
        'Evidence',
        'Lineage'
      ];

      const whiteTrack = document.querySelector('.hlx-hero-rotator__white-track');
      const tealTrack = document.querySelector('.hlx-hero-rotator__teal-track');
      if (!whiteTrack || !tealTrack) return;

      whiteTerms.forEach((term) => {
        const item = document.createElement('span');
        item.className = 'hlx-hero-rotator__white-item';
        item.textContent = term;
        whiteTrack.appendChild(item);
      });

      tealTerms.forEach((term) => {
        const item = document.createElement('span');
        item.className = 'hlx-hero-rotator__teal-item';
        item.textContent = term;
        tealTrack.appendChild(item);
      });

      let whiteIndex = 0;
      let tealIndex = 0;
      const advance = () => {
        whiteIndex = (whiteIndex + 1) % whiteTerms.length;
        tealIndex = (tealIndex + 1) % tealTerms.length;
        whiteTrack.style.transform = `translate3d(0, -${whiteIndex * 1.03}em, 0)`;
        tealTrack.style.transform = `translate3d(0, -${tealIndex * 1.03}em, 0)`;
      };

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!reduceMotion) {
        setInterval(advance, 1450);
      }
    })();
  </script>
</section>
