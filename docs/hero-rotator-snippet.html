<section class="hlx-hero-rotator" aria-labelledby="hlx-hero-title">
  <style>
    .hlx-hero-rotator {
      --hlx-text: #f3f7fb;
      --hlx-muted: #8b9bb0;
      --hlx-accent: #20d3b2;
      width: 100%;
      background: transparent;
      color: var(--hlx-text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .hlx-hero-rotator__title {
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 0.96;
      font-size: clamp(2.8rem, 7vw, 5.6rem);
      max-width: 980px;
    }
    .hlx-hero-rotator__line {
      display: inline-flex;
      align-items: flex-end;
      gap: 0.18em;
      flex-wrap: nowrap;
    }
    .hlx-hero-rotator__window {
      position: relative;
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
      white-space: nowrap;
      min-width: 1ch;
    }
    .hlx-hero-rotator__track {
      display: flex;
      flex-direction: column;
      will-change: transform;
      transform: translate3d(0,0,0);
      transition: transform 546ms cubic-bezier(.22,.61,.36,1);
    }
    .hlx-hero-rotator__item {
      display: flex;
      align-items: center;
      white-space: nowrap;
      margin: 0;
      padding: 0;
    }
    .hlx-hero-rotator__item--white { color: var(--hlx-text); }
    .hlx-hero-rotator__item--teal { color: var(--hlx-accent); }
    .hlx-hero-rotator__desc {
      max-width: 48rem;
      margin: 1.6rem 0 0;
      color: var(--hlx-muted);
      font-size: clamp(1rem, 1.45vw, 1.55rem);
      line-height: 1.6;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      .hlx-hero-rotator__track { transition: none; }
    }
  </style>

  <h1 class="hlx-hero-rotator__title" id="hlx-hero-title" aria-label="Artificial Intelligence Provenance">
    <span class="sr-only">Artificial Intelligence Provenance</span>
    <span class="hlx-hero-rotator__line" aria-hidden="true">
      <span class="hlx-hero-rotator__window hlx-hero-rotator__window--white"><span class="hlx-hero-rotator__track hlx-hero-rotator__track--white"></span></span>
      <span class="hlx-hero-rotator__window hlx-hero-rotator__window--teal"><span class="hlx-hero-rotator__track hlx-hero-rotator__track--teal"></span></span>
    </span>
  </h1>

  <p class="hlx-hero-rotator__desc">
    Cryptographically seal origin, integrity, and authorship with independently verifiable Ed25519 signatures and Merkle-root attestations.
  </p>

  <script>
    (function () {
      const whiteTerms = [
        'Artificial Intelligence','Model Output','Agent Activity','Prompt History','Response Integrity','Training Evidence','Inference Logs','Generated Media','Synthetic Audio','Synthetic Video','Synthetic Images','Dataset Lineage','Document Origin','Message Authenticity','API Responses','Automation Runs','Bot Decisions','Audit Trails','Source Attribution','Claim History','Content Fingerprints','Ledger Entries','Proof Chains','Publication History','Workflow Evidence'
      ];
      const tealTerms = ['Provenance','Verification','Authenticity','Validation','Attestation','Traceability','Integrity','Certification','Evidence','Lineage'];
      const ROTATE_MS = 1820;
      const whiteTrack = document.querySelector('.hlx-hero-rotator__track--white');
      const tealTrack = document.querySelector('.hlx-hero-rotator__track--teal');
      const whiteWindow = document.querySelector('.hlx-hero-rotator__window--white');
      const tealWindow = document.querySelector('.hlx-hero-rotator__window--teal');
      if (!whiteTrack || !tealTrack || !whiteWindow || !tealWindow) return;
      const addItems = (track, terms, cls) => terms.forEach((term) => { const item = document.createElement('span'); item.className = 'hlx-hero-rotator__item ' + cls; item.textContent = term; track.appendChild(item); });
      const lockHeight = (windowEl, trackEl) => { const items = Array.from(trackEl.children); if (!items.length) return 0; const height = Math.ceil(Math.max.apply(null, items.map((item) => item.getBoundingClientRect().height))); windowEl.style.height = height + 'px'; items.forEach((item) => { item.style.height = height + 'px'; item.style.lineHeight = '1'; }); return height; };
      addItems(whiteTrack, whiteTerms, 'hlx-hero-rotator__item--white');
      addItems(tealTrack, tealTerms, 'hlx-hero-rotator__item--teal');
      let whiteStep = 0, tealStep = 0, whiteIndex = 0, tealIndex = 0;
      const measure = () => { whiteStep = lockHeight(whiteWindow, whiteTrack); tealStep = lockHeight(tealWindow, tealTrack); whiteTrack.style.transform = 'translate3d(0,-' + (whiteIndex * whiteStep) + 'px,0)'; tealTrack.style.transform = 'translate3d(0,-' + (tealIndex * tealStep) + 'px,0)'; };
      const advance = () => { whiteIndex = (whiteIndex + 1) % whiteTerms.length; tealIndex = (tealIndex + 1) % tealTerms.length; whiteTrack.style.transform = 'translate3d(0,-' + (whiteIndex * whiteStep) + 'px,0)'; tealTrack.style.transform = 'translate3d(0,-' + (tealIndex * tealStep) + 'px,0)'; };
      const start = () => { measure(); if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) { setInterval(advance, ROTATE_MS); window.addEventListener('resize', measure, { passive: true }); } };
      if (document.fonts && document.fonts.ready) { document.fonts.ready.then(start); } else { window.addEventListener('load', start, { once: true }); }
    })();
  </script>
</section>
